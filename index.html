<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ساعد الأرنب 🐰</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
  background:
  radial-gradient(circle at top,#7c4dff,#3d1766 60%,#1b102e);
  color:white;
  position:relative;
}

/* نجوم الخلفية */

.stars{
  position:absolute;
  width:100%;
  height:100%;
  background-image:
  radial-gradient(white 1px, transparent 1px);
  background-size:50px 50px;
  opacity:.2;
  animation:starsMove 40s linear infinite;
}

@keyframes starsMove{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(50px);
  }
}

/* المحتوى */

.container{
  position:relative;
  z-index:2;
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

/* العنوان */

h1{
  font-size:55px;
  margin-top:20px;
  color:#f5dcff;
  text-shadow:0 0 20px rgba(255,255,255,.2);
}

.subtitle{
  margin-top:15px;
  font-size:20px;
  opacity:.85;
  line-height:1.8;
}

/* الكارت */

.card{
  margin-top:45px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);
  border-radius:35px;
  padding:40px 25px;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
}

/* الرحلة */

.journey{
  position:relative;
  height:220px;
  margin-top:20px;
}

/* الطريق */

.road{
  position:absolute;
  top:110px;
  left:5%;
  width:90%;
  height:20px;
  border-radius:50px;
  background:rgba(255,255,255,.15);
  overflow:hidden;
}

/* التقدم */

.progress{
  width:47%;
  height:100%;
  border-radius:50px;
  background:
  linear-gradient(90deg,#ff9dfc,#ffd166);
  box-shadow:0 0 20px rgba(255,157,252,.6);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{
    filter:brightness(1);
  }
  to{
    filter:brightness(1.2);
  }
}

/* الأرنب */

.bunny{
  position:absolute;
  left:45%;
  top:30px;
  transform:translateX(-50%);
  font-size:85px;
  animation:hop 1.3s infinite alternate ease-in-out;
}

@keyframes hop{
  from{
    transform:translate(-50%,0);
  }

  to{
    transform:translate(-50%,-12px);
  }
}

/* القرية */

.village{
  position:absolute;
  right:3%;
  top:15px;
  font-size:90px;
  animation:villageFloat 2s infinite alternate;
}

@keyframes villageFloat{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-8px);
  }
}

/* النص */

.percent{
  margin-top:20px;
  font-size:32px;
  font-weight:bold;
  color:#ffd6ff;
}

.goal{
  margin-top:12px;
  opacity:.8;
  font-size:18px;
}

/* الزر */

.btn{
  margin-top:35px;
  border:none;
  padding:18px 35px;
  border-radius:999px;
  font-size:20px;
  cursor:pointer;
  color:white;
  background:
  linear-gradient(135deg,#c77dff,#7b2cbf);
  transition:.3s;
  box-shadow:0 10px 25px rgba(199,125,255,.35);
}

.btn:hover{
  transform:scale(1.05);
}

/* المتصدرين */

.top{
  margin-top:40px;
}

.top h2{
  margin-bottom:20px;
  color:#f5dcff;
}

.user{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,.08);
  padding:18px 20px;
  border-radius:20px;
  margin-top:15px;
  transition:.3s;
}

.user:hover{
  transform:translateY(-4px);
  background:rgba(255,255,255,.12);
}

.money{
  color:#ffd166;
  font-weight:bold;
}

/* الفوتر */

.footer{
  margin-top:40px;
  opacity:.65;
  font-size:15px;
}

@media(max-width:700px){

  h1{
    font-size:38px;
  }

  .subtitle{
    font-size:16px;
  }

  .bunny{
    font-size:60px;
  }

  .village{
    font-size:65px;
  }

}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>🐰 Help the bunny reach the carrot</h1>

<p class="subtitle">
Every little bit of support helps me achieve my goals and I will be truly grateful 🙏
</p>

<div class="card">

<div class="journey">

<div class="road">
<div class="progress"></div>
</div>

<div class="bunny">🐰</div>

<div class="village">🥕</div>

</div>

<div class="percent">47% مكتمل</div>

<button class="btn">
Join the bunny journey 💜
</button>

</div>

<div class="card top">

<h2>🏆 المتصدرون</h2>

<div class="user">
<span>🥇 BunnyHero</span>
<span class="money">$25</span>
</div>

<div class="user">
<span>🥈 MoonRabbit</span>
<span class="money">$15</span>
</div>

<div class="user">
<span>🥉 CarrotKing</span>
<span class="money">$8</span>
</div>

</div>

<div class="footer">
Made with 🐰 and carrots 🥕
</div>

</div>

</body>
</html>
