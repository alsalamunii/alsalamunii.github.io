<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رحلة الأرنب إلى قرية الجزر</title>
    <style>
        /* استدعاء خط عربي جذاب من جوجل */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');

        body {
            margin: 0;
            padding: 20px;
            background-color: #e0f7fa; /* لون سماء هادئ */
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 5px solid #ffcc80;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: #f57c00;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p.subtitle {
            color: #777;
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* مشهد الأرنب والقرية */
        .scene {
            position: relative;
            height: 90px;
            border-bottom: 5px dashed #81c784; /* عشب */
            margin-bottom: 25px;
            display: flex;
            align-items: flex-end;
        }

        .village {
            position: absolute;
            left: 0;
            bottom: 0;
            font-size: 55px;
            line-height: 1;
            z-index: 2;
        }

        .rabbit {
            position: absolute;
            right: 0%;
            bottom: 0;
            font-size: 45px;
            /* حركة انسيابية عند تغير النسبة */
            transition: right 1s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 3;
            /* حركة القفز المستمرة */
            animation: bounce 0.8s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); }
        }

        /* شريط التقدم */
        .progress-bg {
            background: #eeeeee;
            height: 28px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-fill {
            background: linear-gradient(90deg, #ffb74d, #ff9800);
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            padding-right: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #555;
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* أزرار التبرع/الدفع */
        .actions button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s ease;
            margin: 5px;
            box-shadow: 0 4px 10px rgba(255,152,0,0.3);
        }

        .actions button:hover {
            background: #f57c00;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255,152,0,0.4);
        }

        .actions button:active {
            transform: translateY(0);
        }

        /* لوحة المتصدرين */
        .leaderboard {
            background: #fff8e1;
            padding: 20px;
            border-radius: 15px;
            margin-top: 35px;
            text-align: right;
            border: 2px solid #ffe082;
        }

        .leaderboard h3 {
            color: #ef6c00;
            margin-top: 0;
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .leaderboard ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard li {
            display: flex;
            justify-content: space-between;
            padding: 10px 10px;
            border-bottom: 2px dashed #ffe082;
            font-weight: bold;
            color: #5d4037;
        }

        .leaderboard li:last-child {
            border-bottom: none;
        }

        .leaderboard li span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* تأثير الجزر المتطاير */
        .floating-carrot {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1.5s forwards ease-out;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            50% { transform: translateY(-50px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>ساعد الأرنب اللطيف للوصول إلى قريته! 🐰</h1>
        <p class="subtitle">كل مساهمة تقرب الأرنب خطوة نحو الجزر اللذيذ</p>

        <!-- مشهد الأرنب والقرية -->
        <div class="scene">
            <div class="village">🏡🥕</div>
            <div class="rabbit" id="rabbit">🐇</div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bg">
            <div class="progress-fill" id="progress-fill">0%</div>
        </div>
        <div class="stats">
            <span id="current-amount">المبلغ الحالي: 0$</span>
            <span id="goal-amount">الهدف: 1000$</span>
        </div>

        <!-- أزرار الدفع -->
        <div class="actions">
            <button onclick="addProgress(50, this)">دفع 50$ 🥕</button>
            <button onclick="addProgress(100, this)">دفع 100$ 🥕</button>
            <button onclick="addProgress(250, this)">دفع 250$ 🥕</button>
        </div>

        <!-- لوحة المتصدرين -->
        <div class="leaderboard">
            <h3>🏆 لوحة شرف المتبرعين</h3>
            <ul id="leaderboard-list">
                <li><span>🥇 أحمد سعيد</span> <span>300$</span></li>
                <li><span>🥈 سارة محمد</span> <span>150$</span></li>
                <li><span>🥉 فاعل خير</span> <span>100$</span></li>
            </ul>
        </div>
    </div>

    <script>
        // إعدادات البداية
        let currentAmount = 0;
        const goalAmount = 1000;

        // عناصر الصفحة
        const progressFill = document.getElementById('progress-fill');
        const currentAmountText = document.getElementById('current-amount');
        const rabbit = document.getElementById('rabbit');
        const container = document.getElementById('main-container');

        // دالة إضافة التقدم
        function addProgress(amount, btnElement) {
            if (currentAmount >= goalAmount) return; // تم الوصول للهدف

            currentAmount += amount;
            if (currentAmount > goalAmount) currentAmount = goalAmount; // لا تتجاوز الهدف

            // حساب النسبة المئوية
            let percentage = (currentAmount / goalAmount) * 100;

            // تحديث العرض
            progressFill.style.width = percentage + '%';
            progressFill.innerText = Math.round(percentage) + '%';
            currentAmountText.innerText = `المبلغ الحالي: ${currentAmount}$`;

            // تحريك الأرنب (الحد الأقصى 85% حتى لا يختفي خلف القرية)
            let rabbitPosition = Math.min(percentage, 85);
            rabbit.style.right = rabbitPosition + '%';

            // إنشاء تأثير بصري (جزر متطاير) عند النقر
            createFloatingEffect(btnElement);

            // رسالة شكر عند اكتمال الهدف
            if (currentAmount === goalAmount) {
                setTimeout(() => {
                    alert("ياي! شكراً لك! لقد وصل الأرنب إلى قرية الجزر بسلام! 🥕🐰🎉");
                }, 1000);
            }
        }

        // دالة إنشاء تأثير الجزر المتطاير
        function createFloatingEffect(btn) {
            const rect = btn.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            const carrot = document.createElement('div');
            carrot.innerText = '🥕';
            carrot.className = 'floating-carrot';
            
            // حساب مكان الظهور بناءً على الزر المضغوط
            const xPos = rect.left - containerRect.left + (rect.width / 2);
            const yPos = rect.top - containerRect.top;
            
            carrot.style.left = `${xPos}px`;
            carrot.style.top = `${yPos}px`;
            
            container.appendChild(carrot);
            
            // إزالة العنصر بعد انتهاء الحركة
            setTimeout(() => {
                carrot.remove();
            }, 1500);
        }
    </script>

</body>
</html>
