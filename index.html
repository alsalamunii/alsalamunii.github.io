<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Under Construction</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* صندوق الموقع */
.container {
  text-align: center;
}

/* الأرنب */
.bunny {
  position: relative;
  width: 120px;
  height: 120px;
  margin: auto;
}

/* الرأس */
.face {
  width: 100px;
  height: 100px;
  background: white;
  border-radius: 50%;
  position: absolute;
  bottom: 0;
  left: 10px;
}

/* الأذن */
.ear {
  width: 25px;
  height: 60px;
  background: white;
  border-radius: 20px;
  position: absolute;
  top: -40px;
}

.ear.left {
  left: 15px;
}

.ear.right {
  right: 15px;
}

/* العيون */
.eye {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 40px;
}

.eye.left { left: 30px; }
.eye.right { right: 30px; }

/* الأنف */
.nose {
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  position: absolute;
  top: 55px;
  left: 46px;
}

/* حركة خفيفة */
.bunny {
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-10px); }
}

/* النص */
h1 {
  margin-top: 40px;
  font-size: 32px;
}

p {
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

  <div class="bunny">
    <div class="ear left"></div>
    <div class="ear right"></div>
    <div class="face">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
    </div>
  </div>

  <h1>🚧 The site is under construction</h1>
  <p>قThe website will likely be launched soon. 🐰</p>

</div>

</body>
</html>
